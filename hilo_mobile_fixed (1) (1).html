<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hi-Lo Counter</title>
<style>
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  margin: 0;
  height: 100%;
  background: #0d0d0d;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  color: #fff;
  overflow: hidden;
}
body {
  position: relative;
  touch-action: manipulation;
}
.zone {
  position: absolute;
  left: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,.12);
  font-size: 28vw;
  font-weight: 800;
  user-select: none;
  -webkit-user-select: none;
  z-index: 1;
}
#plus {
  top: 0;
  height: 50vh;
  background: #177d34;
}
#minus {
  bottom: 0;
  height: 50vh;
  background: #8d2020;
}
.panel {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(92vw, 430px);
  background: rgba(10,10,10,.82);
  backdrop-filter: blur(8px);
  border-radius: 24px;
  padding: 18px 14px;
  box-shadow: 0 14px 40px rgba(0,0,0,.35);
  z-index: 5;
  text-align: center;
}
.label {
  font-size: 13px;
  letter-spacing: .12em;
  opacity: .75;
}
.count {
  font-size: clamp(54px, 18vw, 84px);
  font-weight: 900;
  line-height: 1;
  margin: 8px 0 14px;
}
.row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
input, .btn {
  border: 0;
  border-radius: 14px;
  font-size: 18px;
}
input {
  width: 100%;
  padding: 14px 12px;
  text-align: center;
  background: #fff;
  color: #111;
}
.btn {
  padding: 14px 12px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}
#calc {
  flex: 1;
  background: #ffd34d;
  color: #111;
}
#reset {
  width: 100px;
  background: #3e3e3e;
  color: #fff;
}
#true {
  margin-top: 14px;
  font-size: 30px;
  font-weight: 800;
  min-height: 36px;
}
.hint {
  margin-top: 10px;
  font-size: 12px;
  opacity: .7;
}
.small {
  font-size: 12px;
  opacity: .75;
  margin-top: 6px;
}
@media (max-height:700px) {
  .panel { padding: 14px 12px; }
  .count { font-size: 48px; }
  .zone { font-size: 24vw; }
  #true { font-size: 24px; }
}
</style>
</head>
<body>
<div id="plus" class="zone" aria-label="plus">+</div>
<div id="minus" class="zone" aria-label="minus">−</div>
<div class="panel">
  <div class="label">RUNNING COUNT</div>
  <div id="running" class="count">0</div>
  <input id="decks" type="number" inputmode="decimal" step="0.25" min="0.25" placeholder="Zbývá balíků, např. 3.5">
  <div class="row">
    <div id="calc" class="btn">Spočítat True Count</div>
    <div id="reset" class="btn">Reset</div>
  </div>
  <div id="true">True Count: —</div>
  <div class="hint">Horní půlka = +1 · Dolní půlka = -1</div>
  <div class="small">Na iPhonu klepej mimo středový panel pro + / -</div>
</div>
<script>
(function () {
  let running = 0;
  const runningEl = document.getElementById('running');
  const decksEl = document.getElementById('decks');
  const trueEl = document.getElementById('true');
  const plusEl = document.getElementById('plus');
  const minusEl = document.getElementById('minus');
  const calcEl = document.getElementById('calc');
  const resetEl = document.getElementById('reset');

  function render() {
    runningEl.textContent = String(running);
  }

  function buzz() {
    try {
      if (navigator.vibrate) navigator.vibrate(10);
    } catch (e) {}
  }

  function addDelta(delta) {
    running += delta;
    render();
    buzz();
  }

  function bindTap(el, fn) {
    el.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      fn();
    }, { passive: false });

    el.addEventListener('touchstart', function (e) {
      e.preventDefault();
      e.stopPropagation();
      fn();
    }, { passive: false });
  }

  bindTap(plusEl, function () { addDelta(1); });
  bindTap(minusEl, function () { addDelta(-1); });

  bindTap(calcEl, function () {
    const raw = (decksEl.value || '').replace(',', '.');
    const decks = parseFloat(raw);
    if (!raw || Number.isNaN(decks) || decks <= 0) {
      trueEl.textContent = 'Zadej platný počet balíků';
      return;
    }
    const tc = running / decks;
    const rounded = (tc >= 0 ? '+' : '') + tc.toFixed(2);
    trueEl.textContent = 'True Count: ' + rounded;
  });

  bindTap(resetEl, function () {
    running = 0;
    decksEl.value = '';
    trueEl.textContent = 'True Count: —';
    render();
  });

  render();
})();
</script>
</body>
</html>
